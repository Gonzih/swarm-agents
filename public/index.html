<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⬡ SWARM</title>
<style>
  :root {
    --bg: #080b0f;
    --surface: #0d1117;
    --border: #1e2733;
    --border-bright: #2d3f52;
    --cyan: #00d4ff;
    --cyan-dim: #007a96;
    --green: #00ff88;
    --green-dim: #00663a;
    --red: #ff4466;
    --red-dim: #661122;
    --yellow: #ffcc00;
    --yellow-dim: #664f00;
    --purple: #bb88ff;
    --text: #c9d1d9;
    --text-dim: #4a5568;
    --text-muted: #2d3748;
    --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8, 11, 15, 0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  #logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  #logo .hex { animation: pulse-hex 3s ease-in-out infinite; }
  @keyframes pulse-hex {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #repo-info {
    flex: 1;
    min-width: 0;
  }
  #repo-url {
    color: var(--cyan-dim);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #repo-meta {
    color: var(--text-dim);
    font-size: 10px;
    margin-top: 2px;
  }

  #queue-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    white-space: nowrap;
  }
  .qstat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .qstat-num {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }
  .qstat-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .qstat.pending .qstat-num { color: var(--yellow); }
  .qstat.running .qstat-num { color: var(--cyan); }
  .qstat.done .qstat-num { color: var(--green); }
  .qstat.failed .qstat-num { color: var(--red); }

  #uptime {
    color: var(--text-dim);
    font-size: 11px;
    white-space: nowrap;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  #ws-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #ws-status.connected { background: var(--green); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Canvas ── */
  #canvas {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 12px;
    align-items: start;
  }

  /* ── Agent Card ── */
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .agent-card.busy {
    border-color: var(--cyan-dim);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.06);
  }
  .agent-card.done {
    border-color: var(--green-dim);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.06);
  }
  .agent-card.failed {
    border-color: var(--red-dim);
    box-shadow: 0 0 20px rgba(255, 68, 102, 0.06);
  }
  .agent-card.flash-green { animation: flash-g 0.6s ease-out; }
  .agent-card.flash-red   { animation: flash-r 0.6s ease-out; }
  @keyframes flash-g { 0%{box-shadow:0 0 40px rgba(0,255,136,0.4)} 100%{box-shadow:none} }
  @keyframes flash-r { 0%{box-shadow:0 0 40px rgba(255,68,102,0.4)} 100%{box-shadow:none} }

  /* scan line on busy cards */
  .agent-card.busy::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scan 2s linear infinite;
  }
  @keyframes scan {
    0%   { top: 0;    opacity: 1; }
    90%  { top: 100%; opacity: 0.3; }
    100% { top: 100%; opacity: 0; }
  }

  .card-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .agent-id {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .engine-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid;
    letter-spacing: 0.5px;
  }
  .engine-claude { color: var(--purple); border-color: #6633aa; background: rgba(102,33,170,0.15); }
  .engine-aider  { color: var(--cyan);   border-color: var(--cyan-dim); background: rgba(0,122,150,0.15); }
  .engine-openai { color: var(--green);  border-color: var(--green-dim); background: rgba(0,102,58,0.15); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-left: auto;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .status-dot.busy   { background: var(--cyan);  animation: blink 1.5s infinite; }
  .status-dot.done   { background: var(--green); }
  .status-dot.failed { background: var(--red);   }
  .status-dot.idle   { background: var(--text-muted); }

  .status-text {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status-text.busy   { color: var(--cyan); }
  .status-text.done   { color: var(--green); }
  .status-text.failed { color: var(--red); }

  .card-task {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .task-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .task-title.empty { color: var(--text-dim); font-style: italic; }

  .task-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .task-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-issue     { background: rgba(187,136,255,0.15); color: var(--purple); border: 1px solid #6633aa; }
  .badge-todo      { background: rgba(255,204,0,0.12);  color: var(--yellow); border: 1px solid var(--yellow-dim); }
  .badge-test      { background: rgba(255,68,102,0.12); color: var(--red);    border: 1px solid var(--red-dim); }
  .badge-lint      { background: rgba(0,212,255,0.1);   color: var(--cyan);   border: 1px solid var(--cyan-dim); }
  .badge-synthetic { background: rgba(0,255,136,0.1);   color: var(--green);  border: 1px solid var(--green-dim); }
  .badge-generic   { background: rgba(74,85,104,0.3);   color: var(--text-dim); border: 1px solid var(--border); }

  .task-time {
    font-size: 9px;
    color: var(--text-dim);
    margin-left: auto;
    align-self: center;
    white-space: nowrap;
  }

  /* ── Terminal output ── */
  .card-log {
    height: 180px;
    overflow-y: auto;
    padding: 8px 14px;
    background: rgba(0,0,0,0.3);
    scroll-behavior: smooth;
  }
  .card-log::-webkit-scrollbar { width: 3px; }
  .card-log::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .log-line {
    font-size: 10px;
    line-height: 1.6;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-line.new {
    animation: fade-in 0.2s ease-out;
    color: var(--text);
  }
  @keyframes fade-in { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; } }
  .log-line .ts { color: var(--text-muted); }
  .log-line .pass { color: var(--green); }
  .log-line .fail { color: var(--red); }
  .log-line .warn { color: var(--yellow); }
  .log-line .info { color: var(--cyan); }

  /* ── Card footer ── */
  .card-footer {
    padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.01);
  }
  .branch-tag {
    font-size: 10px;
    color: var(--cyan-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .pr-link {
    font-size: 10px;
    color: var(--purple);
    text-decoration: none;
    padding: 2px 8px;
    border: 1px solid #6633aa;
    border-radius: 3px;
    background: rgba(102,33,170,0.1);
    white-space: nowrap;
  }
  .pr-link:hover { background: rgba(102,33,170,0.25); }

  /* ── Global log panel ── */
  #global-log-panel {
    margin: 0 20px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  #global-log-header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.02);
  }
  #global-log {
    height: 120px;
    overflow-y: auto;
    padding: 8px 14px;
  }
  #global-log::-webkit-scrollbar { width: 3px; }
  #global-log::-webkit-scrollbar-thumb { background: var(--border-bright); }

  /* ── Idle / connecting states ── */
  #connecting {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
    color: var(--text-dim);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
</style>
</head>
<body>

<div id="header">
  <div id="logo"><span class="hex">⬡</span> SWARM</div>
  <div id="repo-info">
    <div id="repo-url">connecting...</div>
    <div id="repo-meta"></div>
  </div>
  <div id="queue-bar">
    <div class="qstat pending"><div class="qstat-num" id="q-pending">0</div><div class="qstat-label">pending</div></div>
    <div class="qstat running"><div class="qstat-num" id="q-running">0</div><div class="qstat-label">running</div></div>
    <div class="qstat done"><div class="qstat-num" id="q-done">0</div><div class="qstat-label">done</div></div>
    <div class="qstat failed"><div class="qstat-num" id="q-failed">0</div><div class="qstat-label">failed</div></div>
  </div>
  <div id="uptime">0s</div>
  <div id="ws-status" title="WebSocket"></div>
</div>

<div id="connecting">
  <div class="spinner"></div>
  <div>connecting to swarm...</div>
</div>

<div id="canvas" style="display:none"></div>

<div id="global-log-panel" style="display:none">
  <div id="global-log-header">swarm log</div>
  <div id="global-log"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('canvas');
const agents = {};   // id → { card, logEl, task, since, engine }
let startTime = Date.now();
let uptimeTimer;
let config = {};

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    $('ws-status').className = 'connected';
    $('connecting').style.display = 'none';
    canvas.style.display = 'grid';
    $('global-log-panel').style.display = '';
    startUptimeTimer();
  };

  ws.onclose = () => {
    $('ws-status').className = '';
    setTimeout(connect, 2000);
  };

  ws.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); } catch {}
  };
}

// ── Event handler ──────────────────────────────────────────────────────────
function handleEvent(evt) {
  switch (evt.type) {

    case 'config':
      config = evt;
      $('repo-url').textContent = evt.repo || '';
      $('repo-meta').textContent =
        `${evt.agentCount} agents · ${evt.engine} · branch: ${evt.baseBranch} · $${evt.budgetUsd}/task`;
      startTime = evt.ts || Date.now();
      break;

    case 'agent_busy': {
      const { id, task, engine } = evt;
      ensureCard(id, engine);
      const a = agents[id];
      a.task = task;
      a.engine = engine;
      a.since = Date.now();
      a.card.className = 'agent-card busy';
      a.card.querySelector('.status-dot').className = 'status-dot busy';
      a.card.querySelector('.status-text').className = 'status-text busy';
      a.card.querySelector('.status-text').textContent = 'working';
      const titleEl = a.card.querySelector('.task-title');
      titleEl.textContent = task.title;
      titleEl.className = 'task-title';
      // badges
      const metaEl = a.card.querySelector('.task-meta');
      metaEl.innerHTML = `<span class="task-badge badge-${task.type || 'generic'}">${task.type || 'task'}</span>`;
      a.card.querySelector('.card-footer').innerHTML = `<span class="branch-tag">⋯ working</span>`;
      break;
    }

    case 'agent_log': {
      const { id, line } = evt;
      if (!agents[id]) ensureCard(id, 'claude');
      const logEl = agents[id]?.logEl;
      if (logEl) appendLog(logEl, line);
      break;
    }

    case 'agent_done': {
      const { id, branch, prUrl } = evt;
      if (!agents[id]) break;
      const a = agents[id];
      a.card.className = 'agent-card done flash-green';
      setTimeout(() => { if (a.card) a.card.className = 'agent-card done'; }, 700);
      a.card.querySelector('.status-dot').className = 'status-dot done';
      a.card.querySelector('.status-text').className = 'status-text done';
      a.card.querySelector('.status-text').textContent = 'done';
      const footer = a.card.querySelector('.card-footer');
      footer.innerHTML = branch
        ? `<span class="branch-tag">⎇ ${branch}</span>${prUrl ? `<a class="pr-link" href="${prUrl}" target="_blank">PR ↗</a>` : ''}`
        : `<span class="branch-tag" style="color:var(--text-dim)">no changes</span>`;
      appendLog(a.logEl, `✓ pushed ${branch || '(noop)'}`);
      break;
    }

    case 'agent_failed': {
      const { id, error } = evt;
      if (!agents[id]) break;
      const a = agents[id];
      a.card.className = 'agent-card failed flash-red';
      setTimeout(() => { if (a.card) a.card.className = 'agent-card failed'; }, 700);
      a.card.querySelector('.status-dot').className = 'status-dot failed';
      a.card.querySelector('.status-text').className = 'status-text failed';
      a.card.querySelector('.status-text').textContent = 'failed';
      a.card.querySelector('.card-footer').innerHTML = `<span class="branch-tag" style="color:var(--red)">${error}</span>`;
      appendLog(a.logEl, `✗ ${error}`);
      break;
    }

    case 'agent_idle': {
      const { id } = evt;
      if (!agents[id]) break;
      const a = agents[id];
      if (a.card.className.includes('done') || a.card.className.includes('failed')) break;
      a.card.className = 'agent-card';
      a.card.querySelector('.status-dot').className = 'status-dot idle';
      a.card.querySelector('.status-text').className = 'status-text';
      a.card.querySelector('.status-text').textContent = 'idle';
      a.card.querySelector('.task-title').textContent = '—';
      a.card.querySelector('.task-title').className = 'task-title empty';
      break;
    }

    case 'queue_update': {
      const s = evt.stats;
      $('q-pending').textContent = s.pending;
      $('q-running').textContent = s.running;
      $('q-done').textContent    = s.done;
      $('q-failed').textContent  = s.failed;
      break;
    }

    case 'global_log':
      appendGlobalLog(evt.line);
      break;

    case 'swarm_done':
      appendGlobalLog(`⬡ SWARM COMPLETE — ${evt.done} done, ${evt.failed} failed, ${evt.elapsed}`);
      break;
  }
}

// ── Card factory ───────────────────────────────────────────────────────────
function ensureCard(id, engine) {
  if (agents[id]) return;
  const engineClass = `engine-${engine || 'claude'}`;
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.innerHTML = `
    <div class="card-header">
      <span class="agent-id">Agent ${id}</span>
      <span class="engine-badge ${engineClass}">${engine || 'claude'}</span>
      <span class="status-text">idle</span>
      <span class="status-dot idle"></span>
    </div>
    <div class="card-task">
      <div class="task-title empty">—</div>
      <div class="task-meta" style="margin-top:4px"></div>
    </div>
    <div class="card-log"></div>
    <div class="card-footer">
      <span class="branch-tag" style="color:var(--text-muted)">waiting for task</span>
    </div>
  `;
  const logEl = card.querySelector('.card-log');
  agents[id] = { card, logEl, since: null };
  canvas.appendChild(card);
}

// ── Log helpers ────────────────────────────────────────────────────────────
function colorLine(text) {
  const t = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  if (/✓|PASS|pass|success|merged|pushed/.test(t)) return `<span class="pass">${t}</span>`;
  if (/✗|FAIL|fail|error|Error|exception|Exception/.test(t)) return `<span class="fail">${t}</span>`;
  if (/warn|WARN|⚠/.test(t)) return `<span class="warn">${t}</span>`;
  if (/→|cloning|Cloning|Discovering|inject|clear/.test(t)) return `<span class="info">${t}</span>`;
  return t;
}

function appendLog(el, line) {
  if (!el || !line.trim()) return;
  const div = document.createElement('div');
  div.className = 'log-line new';
  div.innerHTML = colorLine(line);
  el.appendChild(div);
  // keep last 150 lines
  while (el.children.length > 150) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
  setTimeout(() => div.classList.remove('new'), 300);
}

function appendGlobalLog(line) {
  const el = $('global-log');
  if (!el || !line.trim()) return;
  const div = document.createElement('div');
  div.className = 'log-line new';
  div.innerHTML = `<span class="ts">${timestamp()} </span>` + colorLine(line);
  el.appendChild(div);
  while (el.children.length > 100) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
  setTimeout(() => div.classList.remove('new'), 300);
}

function timestamp() {
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(s / 60), sec = s % 60;
  return `[${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}]`;
}

function startUptimeTimer() {
  clearInterval(uptimeTimer);
  uptimeTimer = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    if (s < 60) $('uptime').textContent = `${s}s`;
    else if (s < 3600) $('uptime').textContent = `${Math.floor(s/60)}m${s%60}s`;
    else $('uptime').textContent = `${Math.floor(s/3600)}h${Math.floor((s%3600)/60)}m`;
  }, 1000);
}

connect();
</script>
</body>
</html>
